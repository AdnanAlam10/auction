services:
  postgres:
    image: postgres:15
    container_name: auction-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
      POSTGRES_DB: auction
    ports:
      - "5433:5432"
    volumes:
      - auction-pgdata:/var/lib/postgresql/data

volumes:
  auction-pgdata:
